runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80

# App Hosting env vars — also set these in Firebase Console if not using this file.
# Secrets must be created first: firebase apphosting:secrets:set SECRET_NAME
env:
  - variable: ADMIN_EMAIL
    secret: ADMIN_EMAIL
    availability:
      - RUNTIME

  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
    availability:
      - RUNTIME

  - variable: AUTH_SECRET
    secret: AUTH_SECRET
    availability:
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: binarybridge-b4986
    availability:
      - RUNTIME

  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyA8P1ABaDqassZpR6kc9Hm-kVbefRTt6KE
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: binarybridge-b4986.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: binarybridge-b4986
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: binarybridge-b4986.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "584653030507"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:584653030507:web:221650c52fdecfafb35d2e
    availability:
      - BUILD
      - RUNTIME
